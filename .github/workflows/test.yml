name: Test

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Build solution
        run: dotnet build api/Concertable.sln --configuration Release

  unit-tests:
    runs-on: ubuntu-latest
    needs: build

    strategy:
      matrix:
        project:
          - api/Modules/Concert/Concertable.Concert.UnitTests/Concertable.Concert.UnitTests.csproj
          - api/Modules/Contract/Concertable.Contract.UnitTests/Concertable.Contract.UnitTests.csproj
          - api/Modules/Payment/Concertable.Payment.UnitTests/Concertable.Payment.UnitTests.csproj
          - api/Modules/Search/Concertable.Search.UnitTests/Concertable.Search.UnitTests.csproj
          - api/Shared/Concertable.Shared.UnitTests/Concertable.Shared.UnitTests.csproj
          - api/Tests/Concertable.Workers.UnitTests/Concertable.Workers.UnitTests.csproj

    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Run ${{ matrix.project }}
        run: dotnet test ${{ matrix.project }} --configuration Release

  integration-tests:
    runs-on: ubuntu-latest
    needs: build

    strategy:
      matrix:
        project:
          - api/Modules/Artist/Concertable.Artist.IntegrationTests/Concertable.Artist.IntegrationTests.csproj
          - api/Modules/Concert/Concertable.Concert.IntegrationTests/Concertable.Concert.IntegrationTests.csproj
          - api/Modules/Search/Concertable.Search.IntegrationTests/Concertable.Search.IntegrationTests.csproj
          - api/Modules/User/Concertable.User.IntegrationTests/Concertable.User.IntegrationTests.csproj
          - api/Modules/Venue/Concertable.Venue.IntegrationTests/Concertable.Venue.IntegrationTests.csproj

    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Run ${{ matrix.project }}
        run: dotnet test ${{ matrix.project }} --configuration Release
