name: Test

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master
  merge_group:
    branches:
      - master

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Build solution
        run: dotnet build api/Concertable.sln --configuration Release

  unit-tests:
    runs-on: ubuntu-latest
    needs: build

    strategy:
      matrix:
        project:
          - api/Modules/Concert/Tests/Concertable.Concert.UnitTests/Concertable.Concert.UnitTests.csproj
          - api/Modules/Contract/Tests/Concertable.Contract.UnitTests/Concertable.Contract.UnitTests.csproj
          - api/Modules/Payment/Tests/Concertable.Payment.UnitTests/Concertable.Payment.UnitTests.csproj
          - api/Modules/Search/Tests/Concertable.Search.UnitTests/Concertable.Search.UnitTests.csproj
          - api/Shared/Tests/Concertable.Shared.UnitTests/Concertable.Shared.UnitTests.csproj
          - api/Tests/Concertable.Workers.UnitTests/Concertable.Workers.UnitTests.csproj

    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Run ${{ matrix.project }}
        run: dotnet test ${{ matrix.project }} --configuration Release

  integration-tests:
    runs-on: ubuntu-latest
    needs: build

    strategy:
      matrix:
        project:
          - api/Modules/Artist/Tests/Concertable.Artist.IntegrationTests/Concertable.Artist.IntegrationTests.csproj
          - api/Modules/Concert/Tests/Concertable.Concert.IntegrationTests/Concertable.Concert.IntegrationTests.csproj
          - api/Modules/Search/Tests/Concertable.Search.IntegrationTests/Concertable.Search.IntegrationTests.csproj
          - api/Modules/User/Tests/Concertable.User.IntegrationTests/Concertable.User.IntegrationTests.csproj
          - api/Modules/Venue/Tests/Concertable.Venue.IntegrationTests/Concertable.Venue.IntegrationTests.csproj

    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Run ${{ matrix.project }}
        run: dotnet test ${{ matrix.project }} --configuration Release

  e2e-api-tests:
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'merge_group'

    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Run API E2E tests
        run: dotnet test api/Tests/Concertable.E2ETests/Concertable.E2ETests.Api/Concertable.E2ETests.Api.csproj --configuration Release

  e2e-ui-tests:
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'merge_group'

    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Build UI E2E tests
        run: dotnet build api/Tests/Concertable.E2ETests/Concertable.E2ETests.Ui/Concertable.E2ETests.Ui.csproj --configuration Release

      - name: Install Playwright browsers
        run: pwsh api/Tests/Concertable.E2ETests/Concertable.E2ETests.Ui/bin/Release/net10.0/playwright.ps1 install --with-deps chromium

      - name: Run UI E2E tests
        run: dotnet test api/Tests/Concertable.E2ETests/Concertable.E2ETests.Ui/Concertable.E2ETests.Ui.csproj --configuration Release --no-build
