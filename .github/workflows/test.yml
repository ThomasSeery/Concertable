name: Test

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

jobs:
  unit-tests:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Run Core unit tests
        run: dotnet test api/Tests/Concertable.Core.UnitTests/Concertable.Core.UnitTests.csproj --configuration Release

      - name: Run Infrastructure unit tests
        run: dotnet test api/Tests/Concertable.Infrastructure.UnitTests/Concertable.Infrastructure.UnitTests.csproj --configuration Release

      - name: Run Workers unit tests
        run: dotnet test api/Tests/Concertable.Workers.UnitTests/Concertable.Workers.UnitTests.csproj --configuration Release

  integration-tests:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Run integration tests
        run: dotnet test api/Tests/Concertable.Web.IntegrationTests/Concertable.Web.IntegrationTests.csproj --configuration Release
